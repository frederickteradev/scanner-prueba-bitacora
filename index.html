<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro | Teradev</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="glass-container">
        <header>
            <div class="logo-icon">⚓</div>
            <h1>Bitácora <span class="highlight">Scanner</span></h1>
            <p>Control de Inventario Inteligente</p>
        </header>

        <main>
            <div id="reader-wrapper">
                <div id="reader"></div>
                <div class="scanner-laser"></div>
            </div>
            
            <div class="info-panel">
                <div class="result-card" id="result-card">
                    <span class="label">CÓDIGO DETECTADO</span>
                    <p id="scanned-result">Esperando lectura...</p>
                </div>
                <button id="reset-btn" class="btn-primary hidden">Nuevo Escaneo</button>
            </div>
        </main>

        <footer>
            <p>Hecho por <strong>Frederick Rodriguez</strong>,  <a href="https://teradev.netlify.app" class="brand">Teradev</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
