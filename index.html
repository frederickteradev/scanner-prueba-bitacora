<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | Prueba Bitácora</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Escáner de Control</h1>
            <p>Apunta al código para registrar el ítem</p>
        </header>

        <main>
            <div id="reader-container">
                <div id="reader"></div>
            </div>
            
            <div class="result-card" id="result-card">
                <span class="label">Resultado:</span>
                <p id="scanned-result">Esperando lectura...</p>
            </div>

            <button id="reset-btn" class="hidden">Escanear de nuevo</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
