<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | Teradev</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/700/700-preview.mp3" preload="auto"></audio>

    <div class="main-layout">
        <div class="card">
            <header class="card-header">
                <div class="header-top">
                    <i data-lucide="layers" class="icon-brand"></i>
                    <span class="status-badge">Prueba de libreria html5-qrcode</span>
                </div>
                <h2>Scanner de Código de Barras</h2>
                <p>Prueba de libreria de scanner de codigo de barras ideal para sistemas de inventarios y control de productos.</p>
            </header>

            <div class="scan-area">
                <div id="reader"></div>
                <div class="scanner-frame">
                    <div class="corner-marker top-left"></div>
                    <div class="corner-marker top-right"></div>
                    <div class="corner-marker bottom-left"></div>
                    <div class="corner-marker bottom-right"></div>
                    <div class="laser-line"></div>
                </div>
            </div>

            <div class="result-section">
                <div class="input-group">
                    <div class="input-header">
                        <i data-lucide="barcode" class="input-icon"></i>
                        <span class="input-label">Número de Código</span>
                    </div>
                    <div class="input-box">
                        <span id="scanned-result">Esperando entrada...</span>
                    </div>
                </div>
                <button id="reset-btn" class="btn-primary hidden">
                    <i data-lucide="refresh-cw"></i>
                    <span>Reiniciar Lector</span>
                </button>
            </div>

            <footer class="credits">
                <div class="credits-content">
                    <p>Desarrollado por <strong>Frederick Rodriguez</strong></p>
                    <a href="https://teradev.netlify.app" target="_blank" class="teradev-link">
                        <span>teradev</span>
                        <i data-lucide="external-link"></i>
                    </a>
                </div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
